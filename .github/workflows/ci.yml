name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install -r requirements.txt
          python -m pip install ruff pytest pytest-cov

      - name: Verify tools
        working-directory: ./backend
        run: |
          python -m ruff --version
          pytest --version

      - name: Lint with Ruff
        working-directory: ./backend
        run: python -m ruff check app/ --ignore E501

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_URL: ""
          UPLOAD_DIR: /tmp/uploads
          FAISS_STORE_DIR: /tmp/faiss_store
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          mkdir -p /tmp/uploads /tmp/faiss_store
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=95 -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t documind-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t documind-frontend ./frontend